name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: code-server-shared-terminals-vsix
          path: code-server-shared-terminals-*.vsix
          if-no-files-found: error
